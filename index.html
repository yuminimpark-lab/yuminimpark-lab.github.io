<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="개인 프로필과 게임을 한곳에서 소개하는 정적 웹사이트">
    <title>Profile · Games</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#profile" aria-label="프로필로 이동">Profile</a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        메뉴
      </button>
      <nav id="site-nav" class="site-nav" aria-label="주요 메뉴">
        <a href="#profile">Profile</a>
        <a href="#games">Games</a>
      </nav>
    </header>

    <main>
      <section id="profile" class="profile-section" aria-labelledby="profile-title">
        <p class="eyebrow">PERSONAL SPACE</p>
        <h1 id="profile-title">프로필</h1>
        <p class="intro">닉네임과 전문 분야를 소개하는 공간입니다.</p>
      </section>

      <section id="games" class="games-section" aria-labelledby="games-title">
        <p class="eyebrow">PLAYGROUND</p>
        <h2 id="games-title">Games</h2>
        <p>게임을 즐길 수 있는 공간입니다.</p>
        <div class="game-frame" aria-label="게임 영역 준비됨"></div>
      </section>
    </main>

    <footer class="site-footer">
      <small>© Personal Space</small>
    </footer>
  </body>
</html>
